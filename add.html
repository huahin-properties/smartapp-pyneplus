<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Asset | THE PYNE PLUS LUXURY V4.21</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --brand: #2D5A27; --accent: #CEA86C; --bg: #F8FAF8; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: #1A3017; margin: 0; padding: 0; }
    .content-wrapper { padding: 20px 20px 200px; max-width: 1240px; margin: 0 auto; }
    .tab-bar { display: flex; gap: 2rem; margin-bottom: 2rem; border-bottom: 2px solid #eee; }
    .tab-btn { padding: 1rem 0; font-weight: 800; font-size: 11px; text-transform: uppercase; color: #999; cursor: pointer; position: relative; background: none; border: none; transition: 0.3s; }
    .tab-btn.active { color: var(--brand); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background: var(--brand); border-radius: 10px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .input-card { background: white; border: 1px solid rgba(45,90,39,0.05); padding: 2.2rem; border-radius: 2.2rem; margin-bottom: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.02); }
    .field-label { font-size: 11px; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 0.6rem; display: block; letter-spacing: 0.5px; }
    .field-label span { color: var(--brand); font-size: 12px; margin-left: 10px; font-weight: 700; border-left: 2px solid #ddd; padding-left: 10px; }
    .field-input { width: 100%; background: #F9F9F8; border: 1.5px solid transparent; border-radius: 1rem; padding: 1rem; font-size: 15px; outline: none; transition: 0.3s; }
    .field-input:focus { border-color: var(--brand); background: white; }
    .field-input[readonly] { background: #f0f2f0; color: var(--brand); font-weight: 700; }
    .img-tile { position: relative; aspect-ratio: 1; border-radius: 1rem; overflow: hidden; border: 1px solid #eee; }
    .img-x { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background: rgba(239,68,68,0.9); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; border: 2px solid white; font-size: 10px; }
    .pdf-row { display: flex; align-items: center; gap: 15px; background: #F9F9F8; padding: 15px; border-radius: 1.2rem; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.03); }
    .pdf-icon { width: 45px; height: 45px; background: #E8F0E7; color: var(--brand); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .btn-pdf-action { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; border: none; }
    .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.98); border-top: 1px solid #eee; padding: 25px 20px; z-index: 1000; text-align: center; }
    .btn-update { background: var(--brand); color: white; width: 100%; max-width: 800px; height: 70px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 20px; box-shadow: 0 10px 30px rgba(45,90,39,0.2); }
    .mini-status { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--brand); display: none; margin-top: 5px; }
    .mini-status.active { display: flex; align-items: center; gap: 5px; }

    /* 🎯 Custom Style สำหรับ Multi-Select Ownership */
    .ownership-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px; }
    .own-item { display: flex; align-items: center; gap: 10px; background: #F9F9F8; padding: 10px 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
    .own-item:hover { background: #F0F2F0; }
    .own-item input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--brand); }
    .own-item span { font-size: 13px; font-weight: 600; color: #444; }
  </style>
</head>
<body>
  <div class="content-wrapper">
    <div class="bg-[#2D5A27] rounded-[2.5rem] p-10 text-white flex justify-between items-center mb-8 shadow-2xl relative overflow-hidden">
      <div class="relative z-10">
        <p class="text-white/60 font-800 uppercase tracking-widest text-[10px] mb-2">THE PYNE PLUS LUXURY | Enrollment Suite</p>
        <h1 class="text-4xl font-800 tracking-tighter italic Sarabun uppercase">ADD + NEW ASSET</h1>
      </div>
      <i class="fas fa-leaf absolute right-[-20px] bottom-[-20px] text-white/5 text-9xl"></i>
    </div>
    <div class="tab-bar">
      <button id="btn-photo" class="tab-btn active" onclick="switchTab('photo')">Visual Assets</button>
      <button id="btn-info" class="tab-btn" onclick="switchTab('info')">Specifications (38 Items)</button>
    </div>

    <div id="tab-photo" class="tab-content active space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="input-card">
          <span class="field-label">Main Image <span>รูปภาพหน้าปก</span></span>
          <div id="thumbPreview" class="w-full aspect-video rounded-2xl bg-slate-50 border-2 border-dashed border-slate-200 flex items-center justify-center overflow-hidden"><i class="fas fa-cloud-upload-alt text-4xl text-slate-200"></i></div>
          <button onclick="document.getElementById('file_thumb').click()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-800 mt-4 text-xs uppercase">UPLOAD COVER</button>
          <div id="status_thumb" class="mini-status"><i class="fas fa-circle-notch animate-spin"></i> Syncing...</div>
          <input type="file" id="file_thumb" class="hidden" accept="image/*" onchange="handleUpload(this, 'thumb')"><input type="hidden" id="Thumbnail_Image">
        </div>
        <div class="input-card">
          <span class="field-label">Visual Gallery <span>อัลบั้มรูปภาพ</span></span>
          <div id="galleryPreview" class="h-48 bg-slate-50 rounded-2xl p-3 grid grid-cols-4 gap-2 overflow-y-auto mb-3"></div>
          <button onclick="document.getElementById('file_gallery').click()" class="w-full py-4 bg-purple-600 text-white rounded-xl font-800 text-xs uppercase">ADD VISUALS</button>
          <div id="status_album" class="mini-status"><i class="fas fa-circle-notch animate-spin"></i> Syncing...</div>
          <input type="file" id="file_gallery" class="hidden" multiple accept="image/*" onchange="handleUpload(this, 'album')"><input type="hidden" id="Album_Image">
        </div>
      </div>

      <div class="input-card">
        <span class="field-label">Master Documents (PDF) <span>จัดการไฟล์เอกสาร</span></span>
        <div class="space-y-3 mt-4">
          <div class="pdf-row">
            <div class="pdf-icon"><i class="fas fa-file-pdf"></i></div>
            <div class="flex-1"><span class="text-[10px] font-800 block text-slate-400 uppercase">Floor Plan</span><span id="txt-FloorPlan_PDF" class="text-[11px] font-700 text-[#2D5A27] truncate italic">No file selected</span></div>
            <div class="flex gap-2">
              <button onclick="viewFile('FloorPlan_PDF')" id="view-FloorPlan_PDF" class="btn-pdf-action bg-white text-emerald-600 border border-emerald-100 hidden"><i class="fas fa-eye"></i></button>
              <button onclick="document.getElementById('f_floor').click()" class="btn-pdf-action bg-blue-600 text-white"><i class="fas fa-upload"></i></button>
              <button onclick="clearFile('FloorPlan_PDF')" id="del-FloorPlan_PDF" class="btn-pdf-action bg-red-50 text-red-500 border border-red-100 hidden"><i class="fas fa-trash"></i></button>
            </div>
            <input type="file" id="f_floor" class="hidden" accept=".pdf" onchange="handleUpload(this, 'floor', 'FloorPlan_PDF')"><input type="hidden" id="FloorPlan_PDF">
          </div>
        </div>
      </div>
    </div>

    <div id="tab-info" class="tab-content space-y-6">
      <div class="input-card grid grid-cols-1 md:grid-cols-3 gap-8">
        <input type="hidden" id="HP_ID" value="">
        
        <div><label class="field-label">2. Listing Type <span>ประกาศ</span></label><input id="Listing_Type" class="field-input font-800" readonly value="Sale"></div>
        
        <div><label class="field-label">3. Asset Category <span>ประเภท</span></label><input id="Type" class="field-input font-800" readonly value="Pool Villa"></div>
        
        <div><label class="field-label">4. Project Name <span>ชื่อโครงการ</span></label><input id="Project_Name" class="field-input font-800" readonly value="The Pyne Plus"></div>
        
        <div><label class="field-label">5. Plot Reference <span>หมายเลขแปลง</span></label><input id="Plot" class="field-input" placeholder="เช่น M17"></div>
        <div><label class="field-label">6. Sales Status <span>สถานะขาย</span></label><select id="Status" class="field-input dynamic-opt"></select></div>
        
        <div class="col-span-full grid grid-cols-1 md:grid-cols-3 gap-8 p-8 rounded-[2.5rem] bg-[#F9F9F8] border-2 border-[#eee] shadow-inner">
          <div><label class="field-label text-blue-600 font-800">7. Sale Price <span>ราคาขายสุทธิ</span></label><input type="number" id="Sale_Price" class="field-input !bg-white" oninput="runCalc()" placeholder="เช่น 7800000"></div>
          <div><label class="field-label">8. Living Area (m2) <span>พื้นที่ใช้สอย</span></label><input type="number" id="Living_Area_sq_m" class="field-input !bg-white" oninput="runCalc()" placeholder="เช่น 345"></div>
          <div><label class="field-label">9. Price/m2 <span>ราคาต่อ ตร.ม.</span></label><input type="number" id="Price_sq_m" class="field-input" readonly value="0"></div>
          <div class="col-span-full border-t border-[#eee] pt-6 grid grid-cols-1 md:grid-cols-3 gap-8">
            <div><label class="field-label font-800">10. Common Fee Rate</label><input type="number" id="Common_Fee_Rate" class="field-input !bg-white" oninput="runCalc()" placeholder="เช่น 4"></div>
            <div><label class="field-label">11. Monthly Fee</label><input id="Monthly_Common_Fee" class="field-input" readonly value="0"></div>
            <div><label class="field-label">12. Yearly Fee</label><input id="Common_Fee_Yearly" class="field-input" readonly value="0"></div>
          </div>
        </div>

        <div><label class="field-label">13. Land Area (m²) <span>พื้นที่ดิน (ม²)</span></label><input type="number" id="Land_Area_sq_m" class="field-input" placeholder="เช่น 500"></div>
        <div><label class="field-label">14. Land Area (sq.w) <span>พื้นที่ดิน (ตร.ว.)</span></label><input type="number" id="Land_Area_sq_w" class="field-input" placeholder="เช่น 125"></div>
        <div><label class="field-label">15. Furnishing</label><select id="Furnishing" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">16. District</label><select id="District" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">17. Sub-District</label><select id="SubDistrict" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">18. Zone</label><select id="Zone" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">19. Bedrooms</label><select id="Bedrooms" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">20. Bathrooms</label><select id="Bathrooms" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">21. Parking Spaces</label><select id="Parking" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">22. Kitchen Style</label><select id="Kitchen_Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">23. Direction Facing</label><select id="Direction" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">24. Electricity</label><select id="Electricity" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">25. Pool Size</label><input id="Pool_Size" class="field-input" placeholder="เช่น 4x8"></div>
        <div><label class="field-label">26. Pool Depth</label><input id="Pool_Depth" class="field-input" placeholder="เช่น 1.2"></div>
        <div><label class="field-label">27. Pool System</label><select id="Pool_System" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">28. View Profile</label><select id="View_Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">29. Water Source</label><select id="Water_Source" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">30. Extras</label><select id="Extras" class="field-input dynamic-opt"></select></div>
        
        <div class="col-span-1 md:col-span-2">
          <label class="field-label">31. Ownership <span>การถือครอง (เลือกได้หลายแบบ)</span></label>
          <div class="ownership-grid">
            <label class="own-item"><input type="checkbox" name="own_opt" value="Thai Freehold"> <span>Thai Freehold</span></label>
            <label class="own-item"><input type="checkbox" name="own_opt" value="Foreign Freehold"> <span>Foreign Freehold</span></label>
            <label class="own-item"><input type="checkbox" name="own_opt" value="Leasehold (30 Years)"> <span>Leasehold (30 Years)</span></label>
            <label class="own-item"><input type="checkbox" name="own_opt" value="Leasehold (Renewable)"> <span>Leasehold (Renewable)</span></label>
            <label class="own-item"><input type="checkbox" name="own_opt" value="Company Ownership"> <span>Company Ownership</span></label>
            <label class="own-item"><input type="checkbox" name="own_opt" value="Usufruct"> <span>Usufruct</span></label>
            <label class="own-item"><input type="checkbox" name="own_opt" value="Superficies"> <span>Superficies</span></label>
          </div>
          <input type="hidden" id="Ownership_Type">
        </div>

        <div><label class="field-label">32. Land Title Deed</label><select id="Land_Title_Deed_Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">33. Transfer Exp.</label><input id="Transfer_Expenses" class="field-input" placeholder="เช่น 50/50"></div>
        <div><label class="field-label">34. Marketing Badge</label><select id="Badge" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">35. Build Stage</label><select id="Build_Stage" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">36. GPS Coordinates</label><input id="Coordinates" class="field-input" placeholder="12.56, 99.95"></div>
        <div class="col-span-full"><label class="field-label">37. Property Description</label><textarea id="Description" rows="4" class="field-input"></textarea></div>
        <div class="col-span-full bg-slate-100 p-6 rounded-2xl border-2 border-dashed border-slate-300">
          <label class="field-label !text-blue-600 font-800">38. System Visibility <span>สถานะในระบบ</span></label>
          <select id="System_Status" class="field-input !bg-white dynamic-opt"></select>
        </div>
      </div>
    </div>
  </div>
  <div class="save-bar"><button id="btn_save" onclick="saveData()" class="btn-update shadow-2xl">PUBLISH TO COCO VAULT</button></div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    let gallery = [], thumbUrl = "", currentHpId = "";

    async function init() {
      try {
        const res = await (await fetch(API, { method:'POST', body: JSON.stringify({ mode: 'getMetadata' }) })).json();
        if (res.ok) {
          const meta = res.data;
          document.querySelectorAll('select.dynamic-opt').forEach(el => {
            let options = meta[el.id] || [];
            // กรองเอา Rented ออกจากสถานะขาย (ถ้ามี)
            if(el.id === 'Status') options = options.filter(v => v !== 'Rented');
            if (options.length > 0) el.innerHTML = `<option value="">-- Select --</option>` + options.map(v => `<option value="${v}">${v}</option>`).join('');
          });
        }
        // ✅ รัน ID ใหม่เบื้องหลังปกติ
        const idRes = await (await fetch(`${API}?mode=getNextId`)).json();
        if(idRes.ok) { currentHpId = idRes.nextId; document.getElementById('HP_ID').value = currentHpId; }
      } catch (e) { console.error("Init Error"); }
    }

    async function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image(); img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas'); const MAX_WIDTH = 1200;
            let width = img.width, height = img.height;
            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
          };
        };
      });
    }

    async function handleUpload(input, target, fieldId) {
      if(!input.files.length) return;
      const statusEl = document.getElementById(`status_${target === 'album' ? 'album' : 'thumb'}`);
      if(statusEl) statusEl.classList.add('active');

      const tasks = Array.from(input.files).map(async (f) => {
        const base64 = f.type.includes("image") ? await compressImage(f) : await new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result.split(',')[1]); });
        const res = await (await fetch(API, { method:'POST', body: JSON.stringify({ mode:'uploadFile', target, hpId: currentHpId, data: base64, type: f.type, name: f.name }) })).json();
        return { res, target, fieldId };
      });

      const results = await Promise.all(tasks);
      results.forEach(({res, target, fieldId}) => {
        if(res.ok) {
          if(target === 'thumb') { thumbUrl = res.url; document.getElementById('thumbPreview').innerHTML = `<img src="${res.url}" class="w-full h-full object-cover">`; document.getElementById('Thumbnail_Image').value = res.url; }
          else if(target === 'album') { gallery.push(res.url); renderGallery(); }
          else if(fieldId) { syncPdfUI(fieldId, res.url, res.fileName); }
        }
      });
      if(statusEl) statusEl.classList.remove('active');
    }

    function renderGallery() {
      document.getElementById('galleryPreview').innerHTML = gallery.map((url, i) => `
        <div class="img-tile">
          <div class="img-x" onclick="deleteImg(${i})">✕</div>
          <img src="${url}" loading="lazy" class="w-full h-full object-cover">
        </div>`).join('');
      document.getElementById('Album_Image').value = gallery.join(',');
    }

    function syncPdfUI(id, url, name) {
      const txt = document.getElementById('txt-'+id); const view = document.getElementById('view-'+id); const del = document.getElementById('del-'+id);
      if (url) { txt.innerText = name || "Attached ✅"; view.classList.remove('hidden'); del.classList.remove('hidden'); document.getElementById(id).value = url; }
      else { txt.innerText = "No file selected"; view.classList.add('hidden'); del.classList.add('hidden'); document.getElementById(id).value = ""; }
    }

    function deleteImg(i) { if(confirm("Remove?")) { gallery.splice(i, 1); renderGallery(); } }
    function viewFile(id) { if(document.getElementById(id).value) window.open(document.getElementById(id).value, '_blank'); }
    function clearFile(id) { if(!confirm("Remove document?")) return; syncPdfUI(id, "", ""); }

    function runCalc() {
      const price = parseFloat(document.getElementById('Sale_Price').value) || 0;
      const area = parseFloat(document.getElementById('Living_Area_sq_m').value) || 0;
      const rate = parseFloat(document.getElementById('Common_Fee_Rate').value) || 0;
      if (area > 0) {
        document.getElementById('Price_sq_m').value = Math.round(price / area);
        const monthly = Math.round(area * rate);
        document.getElementById('Monthly_Common_Fee').value = monthly.toLocaleString();
        document.getElementById('Common_Fee_Yearly').value = (monthly * 12).toLocaleString();
      }
    }

    async function saveData() {
      if(!confirm("Submit Entry to Vault?")) return;
      const selectedOwns = Array.from(document.querySelectorAll('input[name="own_opt"]:checked')).map(cb => cb.value);
      document.getElementById('Ownership_Type').value = selectedOwns.join(', ');
      document.getElementById('btn_save').innerText = "PUBLISHING...";
      const p = { mode: "addUnit" };
      document.querySelectorAll('input, select, textarea').forEach(el => { if(el.id) p[el.id] = el.value; });
      const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(p) })).json();
      if(res.ok) { alert("SUCCESS! ✅"); location.reload(); }
    }

    function switchTab(t) {
      document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      document.getElementById('btn-' + (t === 'photo' ? 'photo' : 'info')).classList.add('active');
    }
    window.onload = init;
  </script>
</body>
</html>
